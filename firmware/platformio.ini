; ============================================================
; Omni-KVM Firmware — PlatformIO Configuration
; ============================================================
; Board: ESP32-S3-DevKitC-1-N8R8
; Framework: Arduino (for rapid prototyping; may migrate to ESP-IDF later)
; ============================================================

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; --- USB Configuration ---
; These flags tell the ESP32-S3 to use its native USB port for
; Serial output (USB CDC). Without them, Serial.println() would
; try to use UART pins instead of the USB-C port.
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; --- Serial Monitor ---
; Baud rate for the serial monitor (View → Serial Monitor in VSCode)
monitor_speed = 115200

; --- Upload ---
; Auto-detect upload port. If this fails, you can set it manually:
; upload_port = /dev/ttyACM0    (Linux/Mac)
; upload_port = COM3            (Windows)
